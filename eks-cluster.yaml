apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: claude-python-demo
  region: us-east-1
  version: "1.31"
  tags:
    project: claude-python-demo
    env: production

iam:
  withOIDC: true  # required for AWS Load Balancer Controller IAM role

managedNodeGroups:
  - name: ng-app
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    privateNetworking: true
    availabilityZones: ["us-east-1a", "us-east-1b", "us-east-1c"]
    iam:
      withAddonPolicies:
        albIngress: true        # grants AWSLoadBalancerControllerIAMPolicy
        cloudWatch: true
        autoScaler: true
    labels:
      role: app
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/claude-python-demo: "owned"

addons:
  - name: vpc-cni
    version: latest
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
